spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: springweb

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  ai:
    openai:
      api-key: ${NVIDIA_API_KEY:local-dev-placeholder}
      base-url: https://integrate.api.nvidia.com
      chat:
        options:
          model: ${NVIDIA_MODEL:nvidia/nemotron-3-ultra-550b-a55b}
          temperature: 1.0

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-your-env-file-please}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
