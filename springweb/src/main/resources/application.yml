spring:
  application:
    name: springweb

  datasource:
    url: ${DB_URL:jdbc:postgresql://db.buyzspyiijeywsmypkgf.supabase.co:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  ai:
    openai:
      api-key: ${NVIDIA_API_KEY:}
      base-url: https://integrate.api.nvidia.com
      chat:
        options:
          model: ${NVIDIA_MODEL:nvidia/nemotron-3-ultra-550b-a55b}
          temperature: 1.0

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-your-env-file-please}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
